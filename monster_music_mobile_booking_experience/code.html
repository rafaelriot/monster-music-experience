<style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff4b89;
            --glass-stroke: rgba(255, 255, 255, 0.15);
        }

        body {
            background-color: #050505;
            color: #e5e2e1;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-stroke);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        .glass-panel::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        }

        .neon-glow-cyan {
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        .step-transition {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
        }

        .step-hidden {
            transform: translateX(100%);
            opacity: 0;
            pointer-events: none;
            position: absolute;
        }

        .step-active {
            transform: translateX(0);
            opacity: 1;
            position: relative;
        }

        .step-past {
            transform: translateX(-100%);
            opacity: 0;
            pointer-events: none;
            position: absolute;
        }

        .noise-texture {
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
            opacity: 0.03;
            pointer-events: none;
        }

        .metallic-text {
            background: linear-gradient(135deg, #fff 0%, #849495 50%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 240, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0); }
        }

        .pulse-animation {
            animation: pulse-cyan 2s infinite;
        }
    </style>

</button>

<!-- Audio Feedback (Simulated) -->
<div class="hidden" id="audio-container"></div>
<script>
        // Form Logic
        let currentStep = 1;
        const totalSteps = 3;

        function updateStep() {
            const sections = ['step-1', 'step-2', 'step-3'];
            const dots = document.querySelectorAll('.step-dot');
            const progressBar = document.getElementById('progress-bar');
            const submitBtnText = document.querySelector('#submit-btn span');

            sections.forEach((id, index) => {
                const el = document.getElementById(id);
                if (index + 1 === currentStep) {
                    el.classList.remove('step-hidden', 'step-past');
                    el.classList.add('step-active');
                    dots[index].classList.remove('bg-white/20');
                    dots[index].classList.add('bg-primary-container', 'shadow-[0_0_8px_#00f0ff]');
                } else if (index + 1 < currentStep) {
                    el.classList.remove('step-active', 'step-hidden');
                    el.classList.add('step-past');
                    dots[index].classList.remove('bg-white/20');
                    dots[index].classList.add('bg-primary-container', 'shadow-[0_0_8px_#00f0ff]');
                } else {
                    el.classList.remove('step-active', 'step-past');
                    el.classList.add('step-hidden');
                    dots[index].classList.add('bg-white/20');
                    dots[index].classList.remove('bg-primary-container', 'shadow-[0_0_8px_#00f0ff]');
                }
            });

            const progress = (currentStep / totalSteps) * 100;
            progressBar.style.height = `${progress}%`;

            if (currentStep === 3) {
                submitBtnText.textContent = "SUBMIT REQ";
                document.getElementById('submit-btn').classList.add('pulse-animation');
            } else {
                submitBtnText.textContent = "INQUIRE NOW";
                document.getElementById('submit-btn').classList.remove('pulse-animation');
            }
        }

        function nextStep(step) {
            if (currentStep < totalSteps) {
                playSlide();
                currentStep++;
                updateStep();
            }
        }

        function prevStep(step) {
            if (currentStep > 1) {
                playSlide();
                currentStep--;
                updateStep();
            }
        }

        function selectService(el) {
            document.querySelectorAll('label').forEach(l => l.classList.remove('selected', 'border-primary-container', 'border-secondary-container', 'border-tertiary-fixed-dim'));
            el.classList.add('selected');
            
            // Add custom active border based on service
            if(el.innerText.includes('Live')) el.classList.add('border-primary-container');
            if(el.innerText.includes('Studio')) el.classList.add('border-secondary-container');
            if(el.innerText.includes('Event')) el.classList.add('border-tertiary-fixed-dim');
        }

        // Haptic-inspired Sound Effects Simulation
        function playTap() {
            // In a real app, this would trigger a short synth beep or haptic vibrate
            console.log("Haptic Tap Triggered");
        }

        function playSlide() {
            console.log("Slide Transition Sound Triggered");
        }

        // Submit Interaction
        document.getElementById('submit-btn').addEventListener('click', () => {
            if(currentStep < 3) {
                nextStep();
            } else {
                playTap();
                const btn = document.getElementById('submit-btn');
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> <span class="ml-2">UPLOADING CHAOS...</span>';
                setTimeout(() => {
                    btn.innerHTML = '<span class="material-symbols-outlined">done_all</span> <span class="ml-2">CONFIRMED</span>';
                    btn.style.backgroundColor = '#4ade80';
                    btn.style.boxShadow = '0 0 30px rgba(74, 222, 128, 0.5)';
                }, 1500);
            }
        });

        // Initialize progress
        updateStep();
    </script>
