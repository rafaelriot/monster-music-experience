<script>
    // Dynamic Web Audio API Synth fallback
    const synthAudio = {
      ctx: null,
      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
      },
      playWhoosh() {
        this.init();
        if (typeof Howler === 'undefined' || !Howler._muted) {
          try {
            const ctx = this.ctx;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            const filter = ctx.createBiquadFilter();
            
            osc.type = 'sawtooth';
            filter.type = 'bandpass';
            filter.Q.value = 10;
            
            osc.frequency.setValueAtTime(100, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.4);
            
            filter.frequency.setValueAtTime(300, ctx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(3000, ctx.currentTime + 0.4);
            
            gain.gain.setValueAtTime(0.01, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
            
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(ctx.destination);
            
            osc.start();
            osc.stop(ctx.currentTime + 0.4);
          } catch(e) {}
        }
      },
      playBassHit() {
        this.init();
        if (typeof Howler === 'undefined' || !Howler._muted) {
          try {
            const ctx = this.ctx;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(120, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.5);
            
            gain.gain.setValueAtTime(0.5, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            osc.start();
            osc.stop(ctx.currentTime + 0.5);
          } catch(e) {}
        }
      }
    };

    // Initialize Audio
    const bassDrop = new Howl({
      src: ['https://actions.google.com/sounds/v1/horror/creepy_low_drone.ogg'], // Simulated bass drop
      volume: 0.8
    });

    const enterSound = new Howl({
      src: ['https://actions.google.com/sounds/v1/foley/whoosh_foley.ogg'], // Simulated scratch/whoosh
      volume: 0.6
    });

    const loadingScreen = document.getElementById('loading-screen');
    const progressBar = document.getElementById('progress-bar');
    const loaderContainer = document.getElementById('loader-container');
    const enterButton = document.getElementById('enter-button');
    const statusText = document.getElementById('loading-status');

    let progress = 0;
    const interval = setInterval(() => {
      progress += Math.random() * 8;
      if (progress >= 100) {
        progress = 100;
        clearInterval(interval);
        handleLoadComplete();
      }
      progressBar.style.width = progress + '%';
    }, 150);

    function handleLoadComplete() {
      // Trigger completion sequence
      try {
        bassDrop.play();
      } catch(e) {}
      synthAudio.playBassHit();
      
      setTimeout(() => {
        // Fade out loader
        loaderContainer.classList.add('opacity-0', 'pointer-events-none');
        
        setTimeout(() => {
          loaderContainer.classList.add('hidden');
          // Show Enter Button
          enterButton.classList.remove('hidden');
          setTimeout(() => {
            enterButton.classList.add('opacity-100', 'translate-y-0');
          }, 50);
        }, 500);
      }, 800);
    }

    enterButton.addEventListener('click', () => {
      try {
        enterSound.play();
      } catch(e) {}
      synthAudio.playWhoosh();
      loadingScreen.classList.add('opacity-0', 'pointer-events-none');
      setTimeout(() => {
        window.location.href = '../monster_music_mobile_experience_home/code.html';
      }, 1000);
    });
  </script>
